<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>佳樂身心診所 - 預約管理系統</title>
    
    <meta name="theme-color" content="#f9e076">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath d='M45 15C30 15 18 27 18 42C18 65 40 85 82 85C70 85 58 75 58 60C58 45 65 35 75 25C65 18 55 15 45 15Z' fill='%23f9e076' /%3E%3Ccircle cx='70' cy='45' r='12' fill='%23ffb85f' /%3E%3C/svg%3E">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
      body { font-family: 'Noto Sans TC', sans-serif; background-color: #fffef9; margin: 0; }
      #loading { position: fixed; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #fffef9; z-index: 9999; }
      .animate-spin { animation: spin 1s linear infinite; }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <div id="loading">
        <div style="width: 32px; height: 32px; border: 4px solid #f3f3f3; border-top: 4px solid #ffb85f; border-radius: 50%;" class="animate-spin"></div>
        <span style="margin-top: 16px; color: #a8a29e; font-size: 12px; font-weight: bold; letter-spacing: 2px;">系統載入中...</span>
    </div>

    <script type="module" src="/src/index.tsx"></script>
</body>
</html>
